{% extends 'base.html' %}

{% block title %}댓글 수정 - FooKet!{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h4 class="fw-bold mb-4"><i class="bi bi-chat-dots-fill text-warning me-2"></i>댓글 수정</h4>
                    <div class="alert alert-light border-0 small mb-4">
                        <strong>{{ restaurant.name }}</strong>에 남기신 댓글을 수정합니다.
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <textarea class="form-control rounded-4 shadow-sm" name="comment_text" rows="4" style="border: 1px solid #eee;">{{ comment.comment }}</textarea>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'restaurant_detail' restaurant.id %}" class="btn btn-light px-4 rounded-pill">취소</a>
                            <button type="submit" class="btn btn-warning px-4 rounded-pill fw-bold">수정 완료</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
